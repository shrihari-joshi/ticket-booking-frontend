---
# GoCD Pipeline: frontend
# Uses pipeline-as-code (YAML config repo plugin)
format_version: 10

pipelines:
  frontend-pipeline:
    group: ticketkhidki-frontend
    label_template: "${COUNT}"
    lock_behavior: none
    display_order: 1

    materials:
      frontend_repo:
        git: https://github.com/shrihari-joshi/ticket-booking-frontend.git
        branch: main
        shallow_clone: true
        destination: frontend

    stages:
      # ─────────────────────────────────────────────────────────────
      # Stage 1: CI — install, lint, test
      # ─────────────────────────────────────────────────────────────
      - ci:
          approval:
            type: success
          jobs:
            lint-and-test:
              tasks:
                - exec:
                    command: npm
                    arguments: [ci]
                    working_directory: frontend
                - exec:
                    command: npm
                    arguments: [run, build]
                    working_directory: frontend

      # ─────────────────────────────────────────────────────────────
      # Stage 2: Build — Vite build + Docker image push to GHCR
      # ─────────────────────────────────────────────────────────────
      - build:
          approval:
            type: success
          jobs:
            docker-build-push:
              tasks:
                - exec:
                    command: npm
                    arguments: [ci]
                    working_directory: frontend
                - exec:
                    command: npm
                    arguments: [run, build]
                    working_directory: frontend
                - exec:
                    command: cmd
                    arguments:
                      - /c
                      - docker build -t ghcr.io/shrihari-joshi/ticket-booking-frontend:%GO_PIPELINE_LABEL% -t ghcr.io/shrihari-joshi/ticket-booking-frontend:latest .
                    working_directory: frontend
                - exec:
                    command: cmd
                    arguments:
                      - /c
                      - docker push ghcr.io/shrihari-joshi/ticket-booking-frontend:%GO_PIPELINE_LABEL%
                    working_directory: frontend

      # ─────────────────────────────────────────────────────────────
      # Stage 3: Deploy Dev — auto-triggered after build
      # ─────────────────────────────────────────────────────────────
      - deploy-dev:
          approval:
            type: success
          environment_variables:
            NAMESPACE: ticket-booking-dev
          jobs:
            deploy:
              tasks:
                - exec:
                    command: cmd
                    arguments:
                      - /c
                      - cd frontend\k8s\overlays\dev && kustomize edit set image frontend=ghcr.io/shrihari-joshi/ticket-booking-frontend:%GO_PIPELINE_LABEL% && kubectl apply -k . && kubectl rollout status deployment/dev-frontend -n ticket-booking-dev

      # ─────────────────────────────────────────────────────────────
      # Stage 4: Deploy QA — requires manual gate
      # ─────────────────────────────────────────────────────────────
      - deploy-qa:
          approval:
            type: manual
            allow_only_on_success: true
          environment_variables:
            NAMESPACE: ticket-booking-qa
          jobs:
            deploy:
              tasks:
                - exec:
                    command: cmd
                    arguments:
                      - /c
                      - cd frontend\k8s\overlays\qa && kustomize edit set image frontend=ghcr.io/shrihari-joshi/ticket-booking-frontend:%GO_PIPELINE_LABEL% && kubectl apply -k . && kubectl rollout status deployment/qa-frontend -n ticket-booking-qa

      # ─────────────────────────────────────────────────────────────
      # Stage 5: Deploy Prod — requires manual gate
      # ─────────────────────────────────────────────────────────────
      - deploy-prod:
          approval:
            type: manual
            allow_only_on_success: true
          environment_variables:
            NAMESPACE: ticket-booking-prod
          jobs:
            deploy:
              tasks:
                - exec:
                    command: cmd
                    arguments:
                      - /c
                      - cd frontend\k8s\overlays\prod && kustomize edit set image frontend=ghcr.io/shrihari-joshi/ticket-booking-frontend:%GO_PIPELINE_LABEL% && kubectl apply -k . && kubectl rollout status deployment/prod-frontend -n ticket-booking-prod
